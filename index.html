<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PragMap</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">
<link rel="stylesheet" href="style.css">
</head>
<body data-view="map">
<div id="map"></div>

<div class="toolbar">
  <div class="glass switcher">
    <button data-switch="map" class="active">Karte</button>
    <button data-switch="db">Datenbank</button>
  </div>
</div>

<aside id="filterDrawer" class="glass sidebar">
  <div class="drawer-head filter-head"><span>Filter</span><div><button class="tiny-btn" data-action="toggle-legend">Legende</button></div></div>
  <div class="filter-content">
  <div class="brand"><h1>RACCOON PRAG</h1></div>

  <div class="panel-section authbar">
    <div data-role="status">Startet …</div>
    <div class="small-note" data-role="auth-hint">Auth wird geprüft …</div>
    <div class="toolbar-mini">
      <div data-role="auth-fields" class="stack" style="display:none;width:100%">
        <input type="email" data-role="login-email" placeholder="E-Mail">
        <input type="password" data-role="login-password" placeholder="Passwort">
      </div>
      <button class="btn" data-role="login-btn-password" data-action="login-password">Login</button>
      <button class="btn" data-role="login-btn-magic" data-action="login-magic" style="display:none">Magic Link</button>
      <button class="btn" data-role="logout-btn" data-action="logout" style="display:none">Logout</button>
      <button class="btn" data-role="seed-btn" data-action="seed-import" style="display:none">Lokale Daten importieren</button>
    </div>
  </div>

  <div class="panel-section">
    <div class="panel-title">Filter</div>
    <div class="search-row"><input data-role="search" placeholder="Suche"></div>
    <div class="row2" style="margin-top:8px">
      <select class="compact-select" data-role="layer-filter"></select>
      <select class="compact-select" data-role="day-filter"></select>
    </div>
    <label style="margin-top:8px"><input type="checkbox" data-role="has-image"> nur mit Bild</label><label class="label-line"><input type="checkbox" data-role="labels-toggle" checked> Pin-Beschriftung</label><details style="margin-top:8px" open><summary>Planung</summary><div class="stack"><select data-role="route-day"></select>
  </div>

  <details class="panel-section" open>
    <summary>Punkte</summary>
    <button class="btn primary" data-action="add-pin">Neuen Pin setzen</button>
  </details>

  <details class="panel-section" open>
    <summary>Bereiche</summary>
    <div id="areaList"></div>
  </details>

  <details class="panel-section" open>
    <summary>Import / Export</summary>
    <div class="stack">
      <button class="btn" data-action="export-json">JSON exportieren</button>
      <label>JSON importieren<input type="file" accept="application/json" data-action="import-json"></label>
      <div class="small-note">GitHub Pages hostet das Frontend, Supabase speichert live für alle.</div>
    </div>
  </details>

  <div class="stats">
    <div class="stat"><b data-stat="spots">0</b>sichtbare Spots</div>
    <div class="stat"><b data-stat="areas">0</b>aktive Bereichsfilter</div>
  </div>
</div></aside>

<section id="resultsDrawer" class="glass results-drawer">
  <div class="drawer-head"><span>Trefferliste</span><button class="tiny-btn" data-action="toggle-results">↔</button></div>
  <div class="drawer-body"><div id="resultsList"></div></div>
</section>

<section id="layersDrawer" class="glass layers-drawer">
  <div class="drawer-head"><span>Layer</span><div><button class="tiny-btn" data-action="toggle-legend">Legende</button><button class="tiny-btn" data-action="new-layer">＋</button><button class="tiny-btn" data-action="toggle-layers">↔</button></div></div>
  <div class="drawer-body"><div id="layerList"></div></div>
</section>

<section id="daysDrawer" class="glass day-drawer">
  <div class="drawer-head"><span>Tage</span><div><button class="tiny-btn" data-action="new-day">＋</button><button class="tiny-btn" data-action="toggle-days">↔</button></div></div>
  <div class="drawer-body"><div id="dayList"></div></div>
</section>

<section id="dbWrap" class="glass">
  <table class="db-table">
    <thead><tr><th>ID</th><th>Name</th><th>Geplanter Tag</th><th>Layer</th><th>Kommentar</th></tr></thead>
    <tbody id="dbBody"></tbody>
  </table>
</section>

<div class="glass legend-pop" data-role="legend-box"></div>

<div id="modal"><div class="glass modal-card" id="modalInner"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<script src="./app.js"></script>
<script>initApp({mobile:false});</script>
</body>
</html>
